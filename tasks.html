<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tasks – Student Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="portal-wrapper">

  <nav class="sidebar">
    <div class="sidebar-brand">
  <img src="Dook.png" alt="Dook University" class="brand-logo">
  <span class="brand-name">StudentPortal</span>
</div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html" class="nav-link-s active"><span class="nav-icon"></span><span>Dashboard</span></a></li>
      <li><a href="notebooks.html" class="nav-link-s"><span class="nav-icon"></span><span>Notebook</span></a></li>
      <li><a href="tasks.html" class="nav-link-s"><span class="nav-icon"></span><span>Tasks</span></a></li>
      <li><a href="profile.html" class="nav-link-s"><span class="nav-icon"></span><span>Profile</span></a></li>
    </ul>
    <button class="btn-logout" onclick="logout()">🚪 Log Out</button>
  </nav>

  <div class="main-area">
    <div class="page-top">
      <h2>Tasks</h2>
    </div>

    <div class="content">
      <div class="d-flex gap-2 mb-3 flex-wrap">
        <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
        <button class="filter-btn" onclick="filterTasks('pending', this)">Pending</button>
        <button class="filter-btn" onclick="filterTasks('done', this)">Done</button>
      </div>

      <div class="row g-3" id="task-grid"></div>

      <div class="card-s mt-4">
        <h6 style="font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:4px">🎮 Play Space</h6>
        <p class="small mb-3" style="color:var(--muted)">Guess the number between 1 and 20!</p>
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <input type="number" id="guessInput" class="game-input" placeholder="1–20" min="1" max="20"/>
          <button class="btn-action" onclick="checkGuess()">Guess</button>
          <button class="btn-action" onclick="resetGame()">New Game</button>
        </div>
        <div id="guess-feedback" class="mt-2" style="font-size:0.84rem;min-height:20px"></div>
      </div>
    </div>

    <footer class="portal-footer text-center py-3">
      <p class="mb-0">Juan Dela Cruz, Maria Santos, Pedro Reyes &nbsp;·&nbsp; Grade 9 – Section A</p>
      <p class="mb-0">
        <a href="https://www.w3schools.com" target="_blank">w3schools.com</a> &nbsp;·&nbsp;
        <a href="https://getbootstrap.com" target="_blank">Bootstrap 5</a>
      </p>
    </footer>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="proj.js"></script>
<script>
  var tasks = [
    { subject: "Mathematics", title: "Drill Sheet 2", due: "May 9, 2026 · 10:00 AM", status: "pending", btn: "Take this activity" },
    { subject: "Science", title: "Lab Activity 3", due: "May 10, 2026 · 11:00 AM", status: "pending", btn: "Take this activity" },
    { subject: "ICT", title: "Quarter Project", due: "May 8, 2026 · 2:30 PM", status: "pending", btn: "Submit" },
    { subject: "VE", title: "Film Critique", due: "May 22, 2026 · 8:00 AM", status: "pending", btn: "Play Video Clip" },
    { subject: "English", title: "Persuasive Essay", due: "May 7, 2026 · 9:00 AM", status: "done", btn: "View" },
    { subject: "Filipino", title: "Sanaysay", due: "May 5, 2026 · 1:00 PM", status: "done", btn: "View" }
  ];

  var activeFilter = 'all';

  function renderTasks(filter) {
    var grid = document.getElementById('task-grid');
    var html = '';
    var count = 0;

    for (var i = 0; i < tasks.length; i++) {
      var t = tasks[i];
      if (filter !== 'all' && t.status !== filter) continue;

      var done = t.status === 'done';
      var badge = done
        ? '<span style="font-size:0.68rem;background:#f0fdf4;color:#16a34a;padding:2px 8px;border-radius:5px;font-weight:700">Done</span>'
        : '<span style="font-size:0.68rem;background:#fff7ed;color:#ea580c;padding:2px 8px;border-radius:5px;font-weight:700">Pending</span>';

      html += '<div class="col-md-6">';
      html += '<div class="task-card" style="opacity:' + (done ? '0.6' : '1') + '">';
      html += '<div class="d-flex justify-content-between align-items-start mb-1">';
      html += '<span class="task-sub">' + t.subject + '</span>' + badge;
      html += '</div>';
      html += '<div class="task-name"' + (done ? ' style="text-decoration:line-through"' : '') + '>' + t.title + '</div>';
      html += '<div class="task-due mb-2">📅 ' + t.due + '</div>';
      if (!done) {
        html += '<button class="btn-action" onclick="markDone(' + i + ')">' + t.btn + '</button>';
      }
      html += '</div></div>';
      count++;
    }

    if (count === 0) {
      html = '<div class="col-12"><p style="color:var(--muted);font-size:0.85rem">No tasks found.</p></div>';
    }

    grid.innerHTML = html;
  }

  function filterTasks(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderTasks(f);
  }

  function markDone(i) {
    tasks[i].status = 'done';
    renderTasks(activeFilter);
    window.alert(tasks[i].title + ' marked as done!');
  }

  renderTasks('all');
</script>
</body>
</html>
