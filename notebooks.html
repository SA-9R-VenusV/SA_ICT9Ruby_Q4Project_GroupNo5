<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notebook – Student Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="portal-wrapper">

  <nav class="sidebar">
    <div class="sidebar-brand">
  <img src="Dook.png" alt="Dook University" class="brand-logo">
  <span class="brand-name">StudentPortal</span>
</div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html" class="nav-link-s active"><span class="nav-icon"></span><span>Dashboard</span></a></li>
      <li><a href="notebooks.html" class="nav-link-s"><span class="nav-icon"></span><span>Notebook</span></a></li>
      <li><a href="tasks.html" class="nav-link-s"><span class="nav-icon"></span><span>Tasks</span></a></li>
      <li><a href="profile.html" class="nav-link-s"><span class="nav-icon"></span><span>Profile</span></a></li>
    </ul>
    <button class="btn-logout" onclick="logout()">🚪 Log Out</button>
  </nav>

  <div class="main-area">
    <div class="page-top">
      <h2>Virtual Notebook</h2>
    </div>

    <div class="content">
      <div class="row g-3" id="nb-grid"></div>

      <div id="note-panel" class="card-s mt-4 d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 id="note-title" style="font-family:'Playfair Display',serif;margin:0;font-size:1.05rem"></h6>
          <button class="btn btn-sm btn-outline-secondary" onclick="closeNote()">✕</button>
        </div>
        <div id="note-body" style="font-size:0.88rem;line-height:1.85;color:var(--text)"></div>
      </div>
    </div>

    <footer class="portal-footer text-center py-3">
      <p class="mb-0">Juan Dela Cruz, Maria Santos, Pedro Reyes &nbsp;·&nbsp; Grade 9 – Section A</p>
      <p class="mb-0">
        <a href="https://www.w3schools.com" target="_blank">w3schools.com</a> &nbsp;·&nbsp;
        <a href="https://getbootstrap.com" target="_blank">Bootstrap 5</a>
      </p>
    </footer>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="proj.js"></script>
<script>
  var subjects = [
    {
      name: "Filipino", icon: "📖", teacher: "Ms. Llamado",
      notes: "<b>Topic: Pagsulat ng Sanaysay</b><br><br>Ang sanaysay ay isang uri ng panitikang nagpapahayag ng mga personal na kuro-kuro tungkol sa isang paksa. Ito ay maaaring pormal o di-pormal, malikhaing isinulat upang magbigay ng kaalaman at damdamin.<br><br><b>Halimbawa:</b><br>Ang pamilya ay ang pundasyon ng isang malusog na lipunan. Dapat nating pahalagahan ang bawat miyembro ng ating tahanan."
    },
    {
      name: "English", icon: "✏️", teacher: "Ms. Iñigo",
      notes: "<b>Topic: Persuasive Writing</b><br><br>Persuasive writing aims to convince the reader of a particular viewpoint using logic, evidence, and emotional appeal.<br><br><b>Key Elements:</b><br>1. Clear thesis statement<br>2. Supporting evidence<br>3. Counterarguments addressed<br>4. Strong conclusion"
    },
    {
      name: "Mathematics", icon: "📐", teacher: "Mr. Lim",
      notes: "<b>Topic: Quadratic Equations</b><br><br>A quadratic equation is of the form: <b>ax² + bx + c = 0</b><br><br><b>Methods to Solve:</b><br>1. Factoring<br>2. Completing the Square<br>3. Quadratic Formula: x = (−b ± √(b²−4ac)) / 2a"
    },
    {
      name: "Science", icon: "🔬", teacher: "Mr. Lucena",
      notes: "<b>Topic: Cell Division – Mitosis</b><br><br>Mitosis is the process by which a cell duplicates its chromosomes and divides into two identical daughter cells.<br><br><b>Stages:</b><br>Prophase → Metaphase → Anaphase → Telophase → Cytokinesis"
    },
    {
      name: "Social Studies", icon: "🌏", teacher: "Mr. Sangat",
      notes: "<b>Topic: Philippine Revolution</b><br><br>The Philippine Revolution of 1896 was an armed conflict between the Filipino people and Spanish colonial authorities.<br><br><b>Key Figures:</b> Andrés Bonifacio, Emilio Aguinaldo, José Rizal"
    },
    {
      name: "Values Education", icon: "💛", teacher: "Mr. Peña",
      notes: "<b>Topic: Respect and Responsibility</b><br><br>Respect means treating others the way you wish to be treated. Responsibility means being accountable for your actions and fulfilling your duties with integrity."
    }
  ];

  var grid = document.getElementById('nb-grid');
  var html = '';
  for (var i = 0; i < subjects.length; i++) {
    var s = subjects[i];
    html += '<div class="col-6 col-md-4">';
    html += '<div class="nb-card" onclick="openNote(' + i + ')">';
    html += '<div style="font-size:1.6rem;margin-bottom:6px">' + s.icon + '</div>';
    html += '<div class="nb-subject">' + s.name + '</div>';
    html += '<div class="nb-teacher">' + s.teacher + '</div>';
    html += '<div class="mt-2"><span class="tag-blue">9-R · 2025–2026</span></div>';
    html += '</div></div>';
  }
  grid.innerHTML = html;

  function openNote(i) {
    var s = subjects[i];
    document.getElementById('note-title').innerHTML = s.icon + ' ' + s.name;
    document.getElementById('note-body').innerHTML = s.notes;
    var panel = document.getElementById('note-panel');
    panel.classList.remove('d-none');
    panel.scrollIntoView({ behavior: 'smooth' });
  }

  function closeNote() {
    document.getElementById('note-panel').classList.add('d-none');
  }
</script>
</body>
</html>
