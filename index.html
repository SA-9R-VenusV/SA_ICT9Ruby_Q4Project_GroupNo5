<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="login-page d-flex flex-column min-vh-100">

  <main class="flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="login-card">
      <div class="text-center mb-4">
        <div class="login-icon"></div>
        <h1 class="login-title">Student Portal</h1>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="username" class="field-label">Username</label>
          <input type="text" id="username" class="portal-input form-control" placeholder="Enter username" required/>
        </div>
        <div class="mb-3">
          <label for="password" class="field-label">Password</label>
          <input type="password" id="password" class="portal-input form-control" placeholder="Enter password" required/>
        </div>
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="stayIn"/>
          <label class="form-check-label field-label" for="stayIn">Stay logged in</label>
        </div>
        <div id="errorMsg" class="alert alert-danger d-none py-2 small mb-3">
          Incorrect username or password.
        </div>
        <button type="submit" class="btn-portal w-100 mb-2">Login</button>
        <button type="button" class="btn-cancel w-100" onclick="document.getElementById('loginForm').reset()">Cancel</button>
      </form>

      <div class="text-center mt-3">
        <a href="#" class="link-soft small">Forgot username / password?</a>
      </div>
    </div>
  </main>

  <footer class="portal-footer text-center py-3">
    <p class="mb-0">Juan Dela Cruz, Maria Santos, Pedro Reyes &nbsp;·&nbsp; Grade 9 – Section A</p>
    <p class="mb-0">
      <a href="https://www.w3schools.com" target="_blank">w3schools.com</a> &nbsp;·&nbsp;
      <a href="https://getbootstrap.com" target="_blank">Bootstrap 5</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="proj.js"></script>
  <script>
    var users = [
      { username: 'bseanayag',  password: 'usa717'       },
      { username: 'kenjii',     password: 'lando'        },
      { username: 'xander_all', password: 'ieatsausages' },
      { username: 'gabbm',      password: 'ubggod'       },
      { username: 'ventlo',     password: '123456'       }
    ];

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var u = document.getElementById('username').value.trim();
      var p = document.getElementById('password').value.trim();
      var match = users.find(function(user) {
        return user.username === u && user.password === p;
      });
      if (match) {
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errorMsg').classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
